[alias]
xtask = "run --package xtask --"
vortex-fetch = "run --package xtask -- vortex-fetch"
vortex-system-tools = "run --package xtask -- vortex-system-tools"
vortex-toolchain-source = "run --package xtask -- vortex-toolchain-source"
vortex-install = "run --package xtask -- vortex-install"
vortex-env = "run --package xtask -- vortex-env"
vortex-status = "run --package xtask -- vortex-status"
vortex-plan-attention = "run --package xtask -- vortex-plan-attention"
vortex-generate-attention = "run --package xtask -- vortex-generate-attention"
vortex-run-attention = "run --package xtask -- vortex-run-attention"

vortex-run-vecadd = "run --package xtask -- vortex-run-vecadd"
check-all = "check --workspace --all-targets --all-features --locked"
clippy-all = "clippy --workspace --all-targets --all-features --locked -- -D warnings"
deny-check = "deny check"
fmt-check = "fmt --all -- --check"
miri-test = "miri test --package mandrel-artifact --package mandrel-compiler --package mandrel-core --package mandrel-device --package mandrel-experiment --package mandrel-ggml-adapter --package mandrel-hardware --package mandrel-kernel-ir --package mandrel-kernels --package mandrel-model-ir --package mandrel-profiler --package mandrel-runtime --package mandrel-schedule --package mandrel-target-ir"
no-std-check = "check --package mandrel-artifact --package mandrel-compiler --package mandrel-core --package mandrel-device --package mandrel-experiment --package mandrel-ggml-adapter --package mandrel-hardware --package mandrel-kernel-ir --package mandrel-kernels --package mandrel-model-ir --package mandrel-profiler --package mandrel-runtime --package mandrel-schedule --package mandrel-target-ir --lib --no-default-features --target riscv64gc-unknown-none-elf --locked"
test-all = "test --workspace --all-targets --all-features --locked"

[env]
MIRIFLAGS = "-Zmiri-strict-provenance -Zmiri-symbolic-alignment-check"
